# ── LOCAL DEV PROFILE ─────────────────────────────────────────────────
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=local
#
# Skips S3 and MySQL. Reads markdown files directly from disk.
# Points to your existing root-cause content folder.

spring:
  autoconfigure:
    # Disable JPA/datasource entirely for local dev — no MySQL needed
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

content:
  # Path to your markdown files on disk (the old root-cause project)
  local-path: C:/Website/root-cause/src/content
